<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h2>Add Book</h2>

<form th:action="@{/books/add}" th:object="${book}" method="post">

    <div class="mb-3">
        <label>ID</label>
        <input type="number" th:field="*{id}" class="form-control"/>
    </div>

    <div class="mb-3">
        <label>Title</label>
        <input type="text" th:field="*{title}" class="form-control"/>
        <div class="text-danger" th:errors="*{title}"></div>
    </div>

    <div class="mb-3">
        <label>Author</label>
        <input type="text" th:field="*{author}" class="form-control"/>
        <div class="text-danger" th:errors="*{author}"></div>
    </div>

    <div class="mb-3">
        <label>Price</label>
        <input type="number" step="0.01" th:field="*{price}" class="form-control"/>
        <div class="text-danger" th:errors="*{price}"></div>
    </div>

    <button type="submit" class="btn btn-success">Add Book</button>
    <a th:href="@{/dashboard}" class="btn btn-secondary">Back</a>

</form>

</body>
</html>
